name: Project CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Job 1: Kiểm tra và Build Backend
  backend-test-and-build:
    runs-on: ubuntu-latest
    
    # Cấu hình Database ảo để Spring Boot có thể kết nối khi chạy Test
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: doan_ltmmt
          MYSQL_USER: ktpm
          MYSQL_PASSWORD: ktpm123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Backend Tests and Build
        run: |
          cd Backend
          chmod +x mvnw
          ./mvnw clean test package

  # Job 2: Kiểm tra và Build Frontend
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and Build
        run: |
          cd frontend
          npm ci
          npm run build

  # Job 3: Đảm bảo Docker Compose hoạt động trơn tru
  docker-compose-check:
    needs: [backend-test-and-build, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Test Docker Build
        run: docker compose build
